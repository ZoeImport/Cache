services:
  # 1. 训练容器 (App)
  trainer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: llm_trainer_1650
    volumes:
      - ../:/app            # 代码挂载，方便热修改
      - ../outputs:/app/outputs # 模型输出挂载
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: tail -f /dev/null # 保持后台运行，通过 exec 进入去跑
    depends_on:
      - db
      - mlflow

  # 2. 数据库 (Postgres)
  db:
    image: postgres:15-alpine
    container_name: llm_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: llm_training_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 3. 监控 (MLflow)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: llm_mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///mlflow.db

volumes:
  pg_data:
