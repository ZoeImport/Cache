site_name: Cache — AI/ML 技术百科
site_description: 从零基础到 OpenCode 全栈的 AI 学习路径（10 卷 46 章）
site_url: https://zoeimport.github.io/Cache/
repo_url: https://github.com/ZoeImport/Cache
repo_name: ZoeImport/Cache

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ZoeImport/Cache

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - admonition
  - footnotes
  - attr_list
  - md_in_html

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-AMS-MML_HTMLorMML

plugins:
  - search:
      lang: zh
  - exclude:
      glob:
        - "*.py"
        - "*.png"
        - "*.jpg"
        - "*.jpeg"
        - "*.gif"
        - "*.svg"
        - "*.sh"
        - "Cargo.*"
        - ".venv/**"
        - "ai/.venv/**"
        - "ai/*/pip-unpack-*/**"
        - "ai/*/code/**"
        - "ai/01-overview/code/**"
        - "ai/02-mathematics/code/**"
        - "ai/03-classical-ml/code/**"
        - "ai/04-neural-networks/code/**"
        - "ai/05-transformer/code/**"
        - "ai/06-self-supervised/code/**"
        - "ai/07-generative-ai/code/**"
        - "ai/08-model-training/code/**"
        - "ai/09-llm-application/code/**"
        - "ai/10-toolchain-integration/code/**"
        - "ai/07-generative-ai/.venv/**"
        - ".omo/**"
        - ".vscode/**"
        - ".idea/**"
        - ".git/**"

